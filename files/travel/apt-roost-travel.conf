// Reapply Proton policy-routing ip rules after any dpkg operation.
// systemd package upgrades (e.g. via unattended-upgrades) re-exec systemd,
// which flushes ip rules not owned by systemd-networkd. The systemd timer
// catches this within 5 minutes; this hook closes the gap so ongoing
// connections don't break for that window.
DPkg::Post-Invoke {
    "if [ -x /etc/roost-travel/proton-routing.sh ] && [ -e /sys/class/net/wg-proton ]; then /etc/roost-travel/proton-routing.sh ensure >/dev/null 2>&1 || true; fi";
};
