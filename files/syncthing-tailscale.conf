[Unit]
After=tailscaled.service
Wants=tailscaled.service

[Service]
# Exit 1 if Tailscale IP is not ready after 60s so Syncthing fails to start
# rather than starting with no Tailscale IP (which would break sync bindings).
# The + prefix runs as root (syncthing@.service runs as the user, who may not
# have access to the Tailscale Unix socket).
ExecStartPre=+/bin/bash -c 'for i in $(seq 1 30); do tailscale ip -4 >/dev/null 2>&1 && exit 0; sleep 2; done; echo "ERROR: Tailscale IP not ready after 60s" >&2; exit 1'
