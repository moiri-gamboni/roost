; PrivateBin php-fpm pool. Deployed to /etc/php/8.3/fpm/pool.d/privatebin.conf.
; Dedicated runtime user; the unix socket is owned by caddy, its only consumer.
[privatebin]
user = privatebin
group = privatebin
listen = /run/php/privatebin.sock
listen.owner = caddy
listen.group = caddy
listen.mode = 0660

; Low-traffic instance: spawn workers on demand, reap them after idling.
pm = ondemand
pm.max_children = 8
pm.process_idle_timeout = 60s
pm.max_requests = 500

; Config lives outside the webroot (see files/privatebin/conf.php).
env[CONFIG_PATH] = /etc/privatebin

; PrivateBin's sizelimit is 10 MB and encrypted JSON bodies carry ~33% base64
; overhead on top, so the PHP request limits need headroom above that.
php_admin_value[post_max_size] = 16M
php_admin_value[upload_max_filesize] = 16M
php_admin_value[memory_limit] = 192M
; PHP may only touch the app, its config, its data and tmp.
php_admin_value[open_basedir] = /var/www/privatebin:/etc/privatebin:/var/lib/privatebin:/tmp
php_admin_flag[expose_php] = off
