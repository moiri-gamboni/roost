set -g mouse on
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm-256color:Tc"
# Extended-key reporting so CC can distinguish Enter from CR inside a paste.
# https://code.claude.com/docs/en/terminal-config#configure-tmux
set -s extended-keys on
set -sa terminal-features 'xterm*:extkeys'
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -s escape-time 0
# assume-paste-time defaults to 1ms: any two key events arriving <1ms apart
# (trivial under TCP packet aggregation over et from termux) flips tmux into
# CLIENT_ASSUMEPASTING, which silently drops every key when the active pane
# is in a mode (choose-window, copy-mode). Disable so single-stroke key
# bursts aren't misclassified as paste. tmux issue #5031, source:
# server-client.c paste_key + window.c window_pane_paste.
set -g assume-paste-time 0
set -g set-clipboard on
set -g allow-passthrough on
set -g focus-events on

# Propagate pane title to the outer terminal (e.g. VS Code tab title)
set -g set-titles on
set -g set-titles-string '#{pane_title}'

# Show pane titles (set by Claude /rename) in status bar
setw -g window-status-format         "#I:#{pane_title}#F"
setw -g window-status-current-format "#I:#{pane_title}#F"
