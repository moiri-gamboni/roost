services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP:-127.0.0.1}:80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks: [web]

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    volumes:
      - $HOME_DIR/.cloudflared:/etc/cloudflared:ro
    networks: [web]

  ntfy:
    image: binwiederhier/ntfy
    restart: unless-stopped
    command: serve
    volumes:
      - ntfy_data:/var/lib/ntfy
    ports:
      - "${TAILSCALE_IP:-127.0.0.1}:2586:80"
    networks: [web]

  syncthing:
    image: syncthing/syncthing
    restart: unless-stopped
    environment:
      - PUID=$USER_UID
      - PGID=$USER_GID
    volumes:
      - $HOME_DIR/roost:/var/syncthing/roost
      - syncthing_config:/var/syncthing/config
    ports:
      - "127.0.0.1:8384:8384"
      - "${TAILSCALE_IP:-127.0.0.1}:22000:22000/tcp"
      - "${TAILSCALE_IP:-127.0.0.1}:22000:22000/udp"
    networks: [web]

networks:
  web:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  ntfy_data:
  syncthing_config:
