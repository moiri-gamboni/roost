; et.cfg : Config file for Eternal Terminal
; Managed by roost-apply -- edit files/et.cfg in the repo and push.

[Networking]
port = 2022
; Bind only to the Tailscale interface. Tailscale ACCEPT in ufw-user-input
; lets tailscale peers reach :2022 directly; xray travel-vpn reaches it
; via a local loopback to the same IP. Public eth0 never sees :2022.
bind_ip = $TAILSCALE_IP

[Debug]
verbose = 0
silent = 0
logsize = 20971520
telemetry = false
logdirectory = /tmp
